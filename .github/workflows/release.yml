name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build all binaries
        run: cargo build --release --bins
      - name: Prepare release bundle
        shell: bash
        run: |
          set -e
          APP_DIR="spider-cloud-rs-${{ github.ref_name }}-${{ matrix.os }}"
          mkdir -p "$APP_DIR/models"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/release/backup-to-cloud.exe "$APP_DIR/"
            cp target/release/cfmmc-crawler-rs.exe "$APP_DIR/"
            cp target/release/cloud-uploader-rs.exe "$APP_DIR/"
            ARCHIVE_NAME="$APP_DIR.zip"
          else
            cp target/release/backup-to-cloud "$APP_DIR/"
            cp target/release/cfmmc-crawler-rs "$APP_DIR/"
            cp target/release/cloud-uploader-rs "$APP_DIR/"
            ARCHIVE_NAME="$APP_DIR.tar.gz"
          fi

          cp backup.toml.example "$APP_DIR/"
          cp cfmmc.toml.example "$APP_DIR/"
          cp cloud-uploader.toml.example "$APP_DIR/"
          cp models/model.onnx "$APP_DIR/models/"
          cp models/vocab.txt "$APP_DIR/models/"

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "$ARCHIVE_NAME" "./$APP_DIR"
          else
            tar -czf "$ARCHIVE_NAME" "$APP_DIR"
          fi
      - name: Upload zipped binary
        uses: actions/upload-artifact@v7
        with:
          name: spider-cloud-rs-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz
          retention-days: 7
        

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --output RELEASE_NOTES.md
      - name: Download all zipped binaries
        uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
